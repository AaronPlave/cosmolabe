name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache LFS test kernels
        # No restore-keys — see deploy-pages.yml for why a stale prefix match
        # can hide missing OIDs.
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-test-kernels-${{ hashFiles('packages/spice/test-kernels/**') }}

      - name: Smudge test-kernel LFS files
        # See deploy-pages.yml: `git lfs install --local` is required so the
        # smudge filter is active when we fetch + checkout. Sparse pull keeps
        # bandwidth low; tests don't touch the viewer's textures/models.
        run: |
          git lfs install --local
          git lfs fetch --include "packages/spice/test-kernels/**"
          git lfs checkout packages/spice/test-kernels/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Run tests
        run: npm test
