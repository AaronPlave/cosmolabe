name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache LFS test kernels
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-test-kernels-${{ hashFiles('packages/spice/test-kernels/**') }}

      - name: Pull test-kernel LFS files
        run: git lfs pull --include "packages/spice/test-kernels/**"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Run tests
        run: npm test
